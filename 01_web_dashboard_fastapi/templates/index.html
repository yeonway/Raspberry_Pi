<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raspberry Pi Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="loginView" class="login-view">
    <form id="loginForm" class="login-card">
      <h1>Dashboard Login</h1>
      <p>Raspberry Pi 제어판 접속</p>
      <input id="username" autocomplete="username" placeholder="아이디" />
      <input id="password" autocomplete="current-password" placeholder="비밀번호" type="password" />
      <button type="submit">로그인</button>
      <div id="loginMessage" class="login-message"></div>
    </form>
  </div>

  <div id="dashboardView" class="app hidden">
    <header>
      <div>
        <h1>Raspberry Pi Dashboard</h1>
        <p>Minecraft / NAS Backup / Phone AI Bridge</p>
      </div>
      <div class="header-actions">
        <span id="currentUser">-</span>
        <button id="refreshBtn">새로고침</button>
        <button id="logoutBtn" class="secondary">로그아웃</button>
      </div>
    </header>

    <section class="grid">
      <div class="card">
        <h2>시스템 상태</h2>
        <div class="row"><span>CPU</span><strong id="cpu">-</strong></div>
        <div class="row"><span>RAM</span><strong id="ram">-</strong></div>
        <div class="row"><span>온도</span><strong id="temp">-</strong></div>
        <div class="row"><span>디스크</span><strong id="disk">-</strong></div>
        <div class="row"><span>OS</span><strong id="os">-</strong></div>
      </div>

      <div class="card">
        <h2>서비스 상태</h2>
        <div class="row"><span>Minecraft 서버</span><strong id="minecraftState">-</strong></div>
        <div class="row"><span>마지막 백업 요청</span><strong id="backupState">-</strong></div>
      </div>
    </section>

    <section class="card">
      <h2>제어 버튼</h2>
      <div class="buttons">
        <button data-command="minecraft_start">Minecraft 시작</button>
        <button data-command="minecraft_stop">Minecraft 중지</button>
        <button data-command="minecraft_restart">Minecraft 재시작</button>
        <button data-command="minecraft_status">Minecraft 상태</button>
        <button data-command="backup_run">NAS 백업 테스트</button>
      </div>
      <p id="commandResult" class="result">대기 중</p>
    </section>

    <section class="card">
      <h2>이벤트 테스트</h2>
      <input id="eventText" placeholder="예: Minecraft 채팅 테스트" />
      <button id="sendEventBtn">이벤트 보내기</button>
      <pre id="events">-</pre>
    </section>

    <section class="card">
      <h2>로그</h2>
      <pre id="logs">로그 로딩 중...</pre>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
