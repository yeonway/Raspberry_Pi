{% extends "community/base.html" %}
{% block title %}글 수정 · DCOUT Community{% endblock %}
{% block content %}
<main class="community-shell community-main">
  <section class="community-page-head">
    <div>
      <span class="community-eyebrow">EDIT</span>
      <h1>게시글 수정</h1>
      <p>작성 시 설정한 비밀번호가 필요합니다.</p>
    </div>
  </section>
  <form class="community-form community-panel" method="post" action="/community/posts/{{ post.id }}/edit">
    {% if error %}<div class="community-alert danger">{{ error }}</div>{% endif %}
    <label>제목
      <input name="title" value="{{ post.title }}" minlength="2" maxlength="80" required />
    </label>
    <label>내용
      <textarea name="content" rows="12" minlength="2" maxlength="3000" required data-counter>{{ post.content }}</textarea>
      <small><span data-count>0</span>/3000</small>
    </label>
    <label>작성 비밀번호
      <input name="password" type="password" minlength="4" maxlength="32" required autocomplete="current-password" />
    </label>
    <button class="community-button primary" type="submit">수정 저장</button>
  </form>
</main>
{% endblock %}
