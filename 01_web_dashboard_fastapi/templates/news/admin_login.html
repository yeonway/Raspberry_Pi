<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Admin</title>
  <link rel="stylesheet" href="/static/news/news.css" />
</head>
<body class="news-admin-login-body">
  <main class="news-admin-login-wrap">
    <form class="news-admin-login-card" method="post" action="/admin/news/login">
      <span class="news-admin-badge">Admin Only</span>
      <h1>News Admin</h1>
      <p>뉴스 글을 관리하려면 로그인하세요.</p>

      {% if error %}
        <div class="news-alert is-error" role="alert">{{ error }}</div>
      {% endif %}

      <div class="news-field">
        <label for="username">아이디</label>
        <input id="username" name="username" value="{{ username }}" autocomplete="username" required />
      </div>
      <div class="news-field">
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="news-primary-button full-width" type="submit">로그인</button>
      <a class="news-return-link" href="/news">뉴스 페이지로 돌아가기</a>
    </form>
  </main>
</body>
</html>
