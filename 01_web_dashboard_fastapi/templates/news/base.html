<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DCOUT News{% endblock %}</title>
  <link rel="stylesheet" href="/static/news/news.css" />
  <script src="/static/news/news.js" defer></script>
</head>
<body class="news-body">
  <header class="news-site-header">
    <div class="news-header-inner">
      <a class="news-brand" href="/news" aria-label="DCOUT News 홈">
        <span class="news-brand-mark">D</span>
        <span>DCOUT News</span>
      </a>
      <form class="news-header-search" method="get" action="/news">
        <label class="news-sr-only" for="headerSearch">뉴스 검색</label>
        <input id="headerSearch" name="q" type="search" value="{{ query|default('') }}" placeholder="검색" maxlength="80" />
        <button type="submit">검색</button>
      </form>
    </div>
    <nav class="news-category-nav" aria-label="뉴스 카테고리">
      <a class="{% if not selected_category|default('') %}is-active{% endif %}" href="/news{% if query|default('') %}?q={{ query|urlencode }}{% endif %}">전체</a>
      {% for item in category_options|default([]) %}
        <a class="{% if selected_category|default('') == item.value %}is-active{% endif %}"
           href="/news?category={{ item.value|urlencode }}{% if query|default('') %}&amp;q={{ query|urlencode }}{% endif %}{% if selected_tag|default('') %}&amp;tag={{ selected_tag|urlencode }}{% endif %}">
          {{ item.label }}
        </a>
      {% endfor %}
    </nav>
  </header>

  {% block content %}{% endblock %}

  <footer class="news-site-footer">
    <div class="news-shell">
      <strong>DCOUT News</strong>
      <span>광고 없이 정리한 서버 소식과 운영 기록</span>
    </div>
  </footer>
</body>
</html>
